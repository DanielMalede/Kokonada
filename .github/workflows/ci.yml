name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  deploy-backend:
    name: Deploy Backend → Railway
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deployment via API
        run: |
          node -e "
          const https = require('https');
          const query = JSON.stringify({
            query: 'mutation { serviceInstanceDeploy(serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\", environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\") }'
          });
          const req = https.request({
            hostname: 'backboard.railway.app', path: '/graphql/v2', method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RAILWAY_TOKEN }}', 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(query) }
          }, (res) => {
            let body = '';
            res.on('data', d => body += d);
            res.on('end', () => {
              const r = JSON.parse(body);
              if (r.errors) { console.error('Railway error:', r.errors[0].message); process.exit(1); }
              console.log('Railway deploy triggered:', JSON.stringify(r.data));
            });
          });
          req.on('error', e => { console.error(e); process.exit(1); });
          req.write(query);
          req.end();
          "

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
