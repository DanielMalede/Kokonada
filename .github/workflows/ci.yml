name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  deploy-backend:
    name: Deploy Backend → Railway
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        # The RAILWAY_TOKEN secret holds an ACCOUNT/personal token, which MUST be
        # passed as RAILWAY_API_TOKEN — the RAILWAY_TOKEN env var only accepts *project*
        # tokens, so feeding an account token to it produced the persistent
        # "Invalid RAILWAY_TOKEN". With an account token the CLI targets the deploy via
        # these project/service/environment IDs. `railway whoami` fails fast with a clear
        # message if the token itself is invalid.
        run: |
          railway --version
          railway whoami
          railway up --detach --service "$RAILWAY_SERVICE_ID"
        working-directory: backend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 1dea751f-6230-491f-9229-29fa158d61df
          RAILWAY_SERVICE_ID: 85ed976d-122c-418b-9981-200929a5804c
          RAILWAY_ENVIRONMENT_ID: d7f5952e-ddbf-41f2-850e-6938d3a5495b

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
