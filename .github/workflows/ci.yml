name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Security — gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so a secret in any commit is caught
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  mobile:
    name: Mobile — jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'   # satisfies engines (node >= 22.11.0). The ProfileScreen async
                               # flush flake (issue #84 / ADR 0007) was root-caused and fixed
                               # in the test (deterministic setImmediate flush); node 24 is now
                               # a deliberate target, no longer a workaround.
          cache: 'npm'
          cache-dependency-path: mobile/KokonadaHealth/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: mobile/KokonadaHealth
      # jest only — NOT `tsc`: pre-existing src/health/* typing errors are documented and
      # unrelated (see ORCHESTRATOR_FABLE definition_of_done). Local gate parity.
      - name: Run tests
        run: ./node_modules/.bin/jest --ci
        working-directory: mobile/KokonadaHealth

  mobile-android-compile:
    name: Mobile — Android compile check
    runs-on: ubuntu-latest
    # Only when Android-native surface could break — jest already gates JS/TS on every PR.
    # Catches the class of failure jest cannot: manifest-merge errors and unresolved resource
    # refs (e.g. a missing R.style.BootTheme) that crash MainActivity.onCreate() at launch
    # (PR #103 Resilience Audit, HIGH). Deliberately NOT a full `assembleDebug` — resource
    # linking + manifest merge + Kotlin/Java compile are the failing tasks; the Skia CMake
    # native build (~15 min) runs later at packageDebug and is proven by the on-device
    # installDebug in the Squad-6 re-pass, so we skip it here to keep the PR gate fast.
    # The job always starts (so it can be a required check) but the paths-filter below skips
    # the costly steps on PRs that don't touch the Android surface.
    steps:
      - uses: actions/checkout@v4
      - name: Detect Android-affecting changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'mobile/KokonadaHealth/android/**'
              - 'mobile/KokonadaHealth/package.json'
              - 'mobile/KokonadaHealth/package-lock.json'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.android == 'true'
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/KokonadaHealth/package-lock.json
      - uses: actions/setup-java@v4
        if: steps.changes.outputs.android == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
        if: steps.changes.outputs.android == 'true'
      - name: Install JS dependencies
        if: steps.changes.outputs.android == 'true'
        run: npm ci
        working-directory: mobile/KokonadaHealth
      - name: Gradle — resource link + manifest merge + Kotlin/Java compile
        if: steps.changes.outputs.android == 'true'
        # gradlew is committed without the execute bit (authored on Windows), so actions/checkout
        # lays it down non-executable → exit 126. chmod it before invoking.
        run: chmod +x gradlew && ./gradlew :app:processDebugResources :app:compileDebugKotlin :app:compileDebugJavaWithJavac --console=plain
        working-directory: mobile/KokonadaHealth/android

  # The backend deploys via Railway's NATIVE GitHub integration: the service is
  # connected to this repo with Root Directory = /backend, branch = main, "auto-deploy
  # on push" + "wait for CI" enabled. Railway builds backend/Dockerfile itself once
  # these CI checks pass — so there is intentionally no `railway up` job here. A CLI
  # `railway up` from this repo fights the service's Root Directory (/backend) and fails
  # the build in ~2s; worse, that failed check made "wait for CI" block the native
  # deploy. Keep backend deploys native; CI only needs to go green.

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
