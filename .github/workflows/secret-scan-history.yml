name: Secret scan (full history)

# Weekly + on-demand FULL-HISTORY gitleaks sweep. The PR-gate job in ci.yml only
# scans each push/PR's commit range; on `schedule`/`workflow_dispatch` gitleaks-action
# scans the entire git history, catching a secret buried anywhere in the repo's past.
# No GITLEAKS_LICENSE is required on a personal GitHub account (DanielMalede). (audit F4)
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  gitleaks-history:
    name: gitleaks — full history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # entire history for the full-repo scan
      - name: gitleaks (detect over full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: "true"
