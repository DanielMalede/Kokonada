<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="height:58px;display:flex;align-items:center;justify-content:space-around;padding:0 12px;background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--glass-br)">
  <div style="width:20px;height:20px;border-radius:6px;border:2px solid {{ home }}"></div>
  <div style="display:flex;gap:2.5px;align-items:flex-end;height:18px">
    <div style="width:3px;height:8px;border-radius:2px;background:{{ pulse }}"></div>
    <div style="width:3px;height:17px;border-radius:2px;background:{{ pulse }}"></div>
    <div style="width:3px;height:11px;border-radius:2px;background:{{ pulse }}"></div>
  </div>
  <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3FB4F0,#8B6FE8,#F5B93A);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(139,111,232,.5);margin-top:-16px">
    <div style="position:relative;width:14px;height:14px">
      <div style="position:absolute;left:6px;top:0;width:2px;height:14px;background:#fff;border-radius:2px"></div>
      <div style="position:absolute;top:6px;left:0;width:14px;height:2px;background:#fff;border-radius:2px"></div>
    </div>
  </div>
  <div style="width:20px;height:20px;border-radius:50%;border:2px solid {{ history }};position:relative">
    <div style="position:absolute;left:7px;top:3.5px;width:2px;height:6px;background:{{ history }};border-radius:2px"></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:1.5px">
    <div style="width:8px;height:8px;border-radius:50%;background:{{ profile }}"></div>
    <div style="width:15px;height:8px;border-radius:8px 8px 0 0;background:{{ profile }}"></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;pulse&quot;,&quot;generate&quot;,&quot;history&quot;,&quot;profile&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active;
    const c = k => a === k ? '#F5B93A' : 'var(--muted)';
    return { home: c('home'), pulse: c('pulse'), history: c('history'), profile: c('profile') };
  }
}
</script>
</body>
</html>
